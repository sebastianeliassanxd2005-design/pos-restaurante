<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo -->
  <rect width="512" height="512" fill="#1e293b" rx="100"/>
  
  <!-- Plato -->
  <circle cx="256" cy="256" r="150" fill="#ffffff"/>
  <circle cx="256" cy="256" r="130" fill="#f8fafc"/>
  <circle cx="256" cy="256" r="110" fill="#ffffff" opacity="0.5"/>
  
  <!-- Tenedor (izquierda, más grande) -->
  <rect x="200" y="160" width="18" height="130" rx="8" fill="#dc2626"/>
  <rect x="194" y="130" width="9" height="40" rx="4.5" fill="#dc2626"/>
  <rect x="205.5" y="130" width="9" height="40" rx="4.5" fill="#dc2626"/>
  <rect x="217" y="130" width="9" height="40" rx="4.5" fill="#dc2626"/>
  
  <!-- Cuchillo (derecha, más grande) -->
  <rect x="290" y="160" width="22" height="130" rx="4" fill="#dc2626"/>
  <polygon points="290,160 312,160 312,190 290,190" fill="#b91c1c"/>
  
  <!-- Texto POS -->
  <text x="256" y="450" font-family="Arial Black" font-size="80" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="8">POS</text>
  
  <!-- Subtítulo -->
  <text x="256" y="485" font-family="Arial" font-size="24" fill="#94a3b8" text-anchor="middle" letter-spacing="4">RESTAURANTE</text>
  
  <!-- Borde decorativo -->
  <circle cx="256" cy="256" r="160" stroke="#dc2626" stroke-width="4" fill="none" opacity="0.4"/>
</svg>
