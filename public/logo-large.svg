<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Fondo degradado azul oscuro premium -->
    <linearGradient id="bgGradientLarge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a2f4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    
    <!-- Sombra más pronunciada para logo grande -->
    <filter id="softShadowLarge" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
      <feOffset dx="0" dy="8" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Gradiente glass con brillo -->
    <linearGradient id="glassGradientLarge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradiente radial para efecto de luz -->
    <radialGradient id="glowEffect" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Fondo -->
  <rect width="512" height="512" fill="url(#bgGradientLarge)" rx="80"/>
  
  <!-- Efecto de brillo sutil -->
  <circle cx="256" cy="256" r="200" fill="url(#glowEffect)"/>
  
  <!-- Círculo blanco central con sombra -->
  <circle cx="256" cy="220" r="110" fill="url(#glassGradientLarge)" filter="url(#softShadowLarge)"/>
  
  <!-- Anillo decorativo sutil alrededor del círculo -->
  <circle cx="256" cy="220" r="115" stroke="rgba(255,255,255,0.1)" stroke-width="2" fill="none"/>
  
  <!-- Icono de tenedor (rojo moderno) - más grande -->
  <g transform="translate(222, 180)">
    <!-- Mango del tenedor -->
    <rect x="22" y="30" width="14" height="55" rx="7" fill="#dc2626"/>
    <!-- Dientes del tenedor -->
    <rect x="18" y="12" width="5" height="24" rx="2.5" fill="#dc2626"/>
    <rect x="25" y="12" width="5" height="24" rx="2.5" fill="#dc2626"/>
    <rect x="32" y="12" width="5" height="24" rx="2.5" fill="#dc2626"/>
  </g>
  
  <!-- Icono de cuchillo (rojo moderno) - más grande -->
  <g transform="translate(270, 180)">
    <!-- Mango del cuchillo -->
    <rect x="14" y="30" width="16" height="55" rx="4" fill="#dc2626"/>
    <!-- Hoja del cuchillo con gradiente -->
    <rect x="10" y="12" width="24" height="28" rx="3" fill="#ef4444"/>
    <!-- Brillo en la hoja -->
    <rect x="14" y="16" width="4" height="20" rx="2" fill="#fca5a5" opacity="0.4"/>
  </g>
  
  <!-- Texto POS - más grande -->
  <text x="256" y="380" 
        font-family="'Segoe UI', Arial, sans-serif" 
        font-size="80" 
        font-weight="800" 
        fill="#ffffff" 
        text-anchor="middle" 
        letter-spacing="6">POS</text>
  
  <!-- Texto RESTAURANTE - más grande -->
  <text x="256" y="420" 
        font-family="'Segoe UI', Arial, sans-serif" 
        font-size="16" 
        font-weight="600" 
        fill="#94a3b8" 
        text-anchor="middle" 
        letter-spacing="10">RESTAURANTE</text>
  
  <!-- Línea decorativa con gradiente -->
  <defs>
    <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#334155;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#475569;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:0" />
    </linearGradient>
  </defs>
  <line x1="156" y1="445" x2="356" y2="445" 
        stroke="url(#lineGradient)" 
        stroke-width="2"/>
</svg>
