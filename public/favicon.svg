<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Fondo degradado azul oscuro -->
    <linearGradient id="faviconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    
    <!-- Sombra suave -->
    <filter id="faviconShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
      <feOffset dx="0" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fondo redondeado -->
  <rect width="64" height="64" fill="url(#faviconBg)" rx="16"/>
  
  <!-- Círculo blanco central -->
  <circle cx="32" cy="28" r="14" fill="#ffffff" filter="url(#faviconShadow)"/>
  
  <!-- Icono de tenedor (rojo) -->
  <g transform="translate(27, 22)">
    <rect x="4" y="8" width="2" height="8" rx="1" fill="#dc2626"/>
    <rect x="3.5" y="4" width="1" height="5" rx="0.5" fill="#dc2626"/>
    <rect x="4.5" y="4" width="1" height="5" rx="0.5" fill="#dc2626"/>
    <rect x="5.5" y="4" width="1" height="5" rx="0.5" fill="#dc2626"/>
  </g>
  
  <!-- Icono de cuchillo (rojo) -->
  <g transform="translate(33, 22)">
    <rect x="2" y="8" width="2" height="8" rx="1" fill="#dc2626"/>
    <rect x="1.5" y="4" width="3" height="6" rx="1" fill="#ef4444"/>
  </g>
  
  <!-- Texto POS -->
  <text x="32" y="52" 
        font-family="Arial Black, sans-serif" 
        font-size="10" 
        font-weight="900" 
        fill="#ffffff" 
        text-anchor="middle">POS</text>
</svg>
