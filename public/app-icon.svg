<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo azul marino oscuro -->
  <rect width="1024" height="1024" rx="226" fill="#1a2744"/>
  
  <!-- Círculo blanco (70% del ícono = 717px) -->
  <circle cx="512" cy="512" r="358" fill="#ffffff"/>
  
  <!-- Borde rojo delgado alrededor del círculo (8px) -->
  <circle cx="512" cy="512" r="358" stroke="#dc2626" stroke-width="8" fill="none"/>
  
  <!-- Tenedor y cuchillo en rojo (50% de la altura del círculo = ~358px) -->
  <g transform="translate(512, 512)" fill="#dc2626">
    <!-- Tenedor (izquierda) -->
    <g transform="translate(-100, 0)">
      <!-- Dientes del tenedor -->
      <rect x="-25" y="-179" width="18" height="107" rx="4"/>
      <rect x="-7" y="-179" width="18" height="107" rx="4"/>
      <rect x="11" y="-179" width="18" height="107" rx="4"/>
      <!-- Mango del tenedor -->
      <rect x="-25" y="-72" width="50" height="143" rx="8"/>
    </g>
    
    <!-- Cuchillo (derecha) -->
    <g transform="translate(100, 0)">
      <!-- Hoja del cuchillo -->
      <rect x="-25" y="-179" width="50" height="125" rx="4"/>
      <!-- Mango del cuchillo -->
      <rect x="-25" y="-54" width="50" height="125" rx="8"/>
      <!-- Línea decorativa en el mango -->
      <rect x="-25" y="-36" width="50" height="8" rx="2" fill="#b91c1c"/>
    </g>
  </g>
  
  <!-- Texto "POS" en negrita blanca sans-serif -->
  <text x="512" y="860" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="120" 
        font-weight="bold" 
        fill="#ffffff" 
        text-anchor="middle" 
        letter-spacing="8">POS</text>
</svg>
