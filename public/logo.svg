<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Fondo degradado azul oscuro -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    
    <!-- Sombra suave para el círculo -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" />
      <feOffset dx="0" dy="4" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Gradiente para efecto glass -->
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo -->
  <rect width="512" height="512" fill="url(#bgGradient)" rx="60"/>
  
  <!-- Círculo blanco central con sombra -->
  <circle cx="256" cy="200" r="90" fill="url(#glassGradient)" filter="url(#softShadow)"/>
  
  <!-- Icono de tenedor (rojo moderno) -->
  <g transform="translate(230, 165)">
    <!-- Mango del tenedor -->
    <rect x="18" y="25" width="10" height="45" rx="5" fill="#dc2626"/>
    <!-- Dientes del tenedor -->
    <rect x="15" y="10" width="4" height="20" rx="2" fill="#dc2626"/>
    <rect x="21" y="10" width="4" height="20" rx="2" fill="#dc2626"/>
    <rect x="27" y="10" width="4" height="20" rx="2" fill="#dc2626"/>
  </g>
  
  <!-- Icono de cuchillo (rojo moderno) -->
  <g transform="translate(268, 165)">
    <!-- Mango del cuchillo -->
    <rect x="10" y="25" width="12" height="45" rx="3" fill="#dc2626"/>
    <!-- Hoja del cuchillo -->
    <rect x="8" y="10" width="16" height="22" rx="2" fill="#ef4444"/>
  </g>
  
  <!-- Texto POS -->
  <text x="256" y="340" 
        font-family="'Segoe UI', Arial, sans-serif" 
        font-size="64" 
        font-weight="800" 
        fill="#ffffff" 
        text-anchor="middle" 
        letter-spacing="4">POS</text>
  
  <!-- Texto RESTAURANTE -->
  <text x="256" y="375" 
        font-family="'Segoe UI', Arial, sans-serif" 
        font-size="14" 
        font-weight="500" 
        fill="#94a3b8" 
        text-anchor="middle" 
        letter-spacing="8">RESTAURANTE</text>
  
  <!-- Línea decorativa sutil -->
  <line x1="180" y1="390" x2="332" y2="390" 
        stroke="#334155" 
        stroke-width="1" 
        opacity="0.5"/>
</svg>
